name: kapila_learning
description: KAPILA Learning Education App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Permissions
  permission_handler: 11.3.1

  # WebView
  webview_flutter: 4.10.0

  # Charts
  fl_chart: 0.68.0

  # UI & Icons
  google_fonts: 6.2.1
  cached_network_image: 3.4.1
  flutter_svg: 2.0.14

  # Navigation
  go_router: 13.2.0

  # State Management
  provider: 6.1.2

  # Backend
  supabase_flutter: ^2.12.0
  http: 1.2.2

  # Storage & Utils
  shared_preferences: 2.3.3
  intl: 0.19.0
  timeago: 3.7.0
  share_plus: 7.2.2
  url_launcher: 6.3.1

  # Media & Chat
  image_picker: 1.0.7
  emoji_picker_flutter: 1.6.3
  file_picker: 6.1.1

  # Contacts
  flutter_contacts: 1.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  win32: 5.9.0
