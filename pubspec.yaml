name: kapila_learning
description: KAPILA Learning Education App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Permissions
  permission_handler: ^11.0.1

  # WebView
  webview_flutter: ^4.4.4

  # Charts
  fl_chart: ^0.66.0

  # UI & Icons
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9

  # Navigation
  go_router: ^13.0.0

  # State Management
  provider: ^6.1.1                  # ✅ ThemeProvider માટે - already present

  # Backend
  supabase_flutter: ^2.0.0
  http: ^1.1.2

  # Storage & Utils
  shared_preferences: ^2.2.2        # ✅ Theme persist માટે - already present
  intl: ^0.18.1
  timeago: ^3.6.1
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  path_provider: ^2.1.1

  # Media & Chat
  image_picker: ^1.0.5
  emoji_picker_flutter: ^2.0.0
  file_picker: ^8.1.2

  # Contacts
  flutter_contacts: ^1.1.7+1

  # Chat Features
  device_info_plus: ^9.1.1
  connectivity_plus: ^5.0.2
  flutter_local_notifications: ^17.2.3
  crypto: ^3.0.3

  # Additional Chat Dependencies
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  photo_view: ^0.14.0
  gal: ^2.1.4
  video_player: ^2.8.1
  flutter_linkify: ^6.0.0
  uuid: ^4.2.1

  # Deep Links - Password Reset માટે
  app_links: ^6.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/