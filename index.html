<!DOCTYPE html><html lang="gu"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KAPILA Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>:root{--primary:#6c5ce7;--primary-light:#a29bfe;--bg:#f0efff;--card:#fff;--text:#2d3436;--muted:#636e72;--border:#e0dff7;--green:#00b894;--red:#d63031;--orange:#e17055;--radius:10px;--shadow:0 2px 12px rgba(108,92,231,.1);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.wrap{padding:16px;max-width:900px;margin:0 auto;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:22px;font-weight:700;}
.page-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit;background:#fafafa;}
input:focus,select:focus,textarea:focus{border-color:var(--primary-light);background:#fff;}
textarea{resize:vertical;min-height:80px;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;}
.fg{margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:opacity .2s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-block{width:100%;justify-content:center;padding:12px;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tab{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:var(--card);color:var(--muted);}
.tab.active{background:var(--primary);color:#fff;}
.tab.orange{background:var(--orange);color:#fff;}
.badge-status{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.badge-pending{background:#fff3cd;color:#856404;}
.badge-approved,.badge-active,.badge-true,.badge-live{background:#d4edda;color:#155724;}
.badge-rejected,.badge-inactive,.badge-false{background:#f8d7da;color:#721c24;}
.badge-needs_more_info{background:#d1ecf1;color:#0c5460;}
.badge-owner{background:#e9d5ff;color:#6d28d9;}
.badge-admin{background:#dbeafe;color:#1e40af;}
.badge-moderator{background:#fce7f3;color:#9d174d;}
.role-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;}
.user-card{border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;background:var(--card);}
.user-card h4{font-size:15px;margin-bottom:4px;}
.user-card .meta{font-size:12px;color:var(--muted);line-height:1.8;}
.user-card .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;flex:1;min-width:100px;box-shadow:var(--shadow);}
.stat-card .val{font-size:28px;font-weight:800;color:var(--primary);}
.stat-card .lbl{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;}
.bar-label{width:55px;color:var(--muted);flex-shrink:0;}
.bar-track{flex:1;background:var(--border);border-radius:4px;height:8px;}
.bar-fill{height:8px;border-radius:4px;background:var(--primary);}
.bar-info{font-size:11px;color:var(--muted);white-space:nowrap;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.alert-error{background:#f8d7da;color:#721c24;}
.alert-success{background:#d4edda;color:#155724;}
.alert-info{background:#d1ecf1;color:#0c5460;}
.loading,.empty{text-align:center;padding:30px;color:var(--muted);font-size:14px;}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.sec-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--card);border-radius:var(--radius);padding:24px;max-width:500px;width:95%;max-height:90vh;overflow-y:auto;}
.modal-box h3{margin-bottom:16px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.sync-time{font-size:11px;color:var(--muted);}
@media(max-width:600px){.stats-row .stat-card{min-width:80px;}.page-title{font-size:18px;}}
.login-card{background:var(--card);border-radius:var(--radius);padding:36px;box-shadow:var(--shadow);max-width:400px;margin:60px auto;}
.login-card h2{color:var(--primary);margin-bottom:24px;font-size:22px;}
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.mod-btn{background:var(--card);border:none;border-radius:var(--radius);padding:18px 14px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);text-align:left;box-shadow:var(--shadow);transition:transform .15s;}
.mod-btn:hover{transform:translateY(-2px);}
#page-dashboard{display:none;}
</style></head><body>
<div class="topbar">KAPILA Management System</div>
<!-- LOGIN -->
<div id="page-login" class="wrap">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <div id="login-alert"></div>
    <div class="fg"><label>Email</label><input type="email" id="login-email" placeholder="admin@example.com"></div>
    <div class="fg"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Login</button>
  </div>
</div>
<!-- DASHBOARD -->
<div id="page-dashboard" class="wrap">
  <div class="page-header">
    <div><div class="page-title">Admin Panel</div>
      <div style="font-size:12px;color:var(--muted)">Access Granted: <span id="dash-role" class="role-tag"></span></div></div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout2()">Logout</button>
  </div>
  <div class="sec-label">Choose a module:</div>
  <div class="module-grid">
    <button class="mod-btn" style="background:linear-gradient(135deg,#a29bfe22,#6c5ce722)" onclick="go('analytics.html')">📊 App Analytics</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#00b89422,#00cec922)" onclick="go('revenue.html')">💰 Revenue Analytics</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#fd79a822,#e8408422)" onclick="go('verification.html')">✅ Verification Requests</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#74b9ff22,#0984e322)" onclick="go('verified.html')">🏅 Verified Users</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#ff7f7f22,#d6303122)" onclick="go('reports.html')">🚩 Reports</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#ffeaa722,#fdcb6e22)" onclick="go('suggestions.html')">💡 Suggestions</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#dfe6e922,#b2bec322)" onclick="go('feedback.html')">💬 Ask/Feedback Replies</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#74b9ff22,#a29bfe22)" onclick="go('affiliate-requests.html')">🤝 Affiliate Requests</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#55efc422,#00b89422)" onclick="go('affiliate-payouts.html')">💸 Affiliate Payouts</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#fd79a822,#fdcb6e22)" onclick="go('affiliate-commission.html')">📋 Commission Rules</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#fdcb6e22,#e1705522)" onclick="go('subscription-plans.html')">📦 Subscription Plans</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#ff7f7f22,#a29bfe22)" onclick="go('test-series.html')">📝 Test Series Manager</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#74b9ff22,#dfe6e922)" onclick="go('mock-broadcast.html')">📢 Mock Broadcast</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#a29bfe22,#dfe6e922)" onclick="go('notification-broadcast.html')">🔔 Notification Broadcast</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#74b9ff22,#a29bfe22)" onclick="go('admin-users.html')">👤 Admin Users</button>
    <button class="mod-btn" style="background:linear-gradient(135deg,#dfe6e922,#b2bec322)" onclick="go('audit-logs.html')">📜 Audit Logs</button>
  </div>
</div>
<script>
// ── SHARED CONFIG ── paste your values here
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;
let currentRole = null;

// ── AUTH ──
async function initAuth(requiredRoles) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return false; }
  currentUser = session.user;
  const { data } = await sb.from('ngm_admin_roles')
    .select('role,is_active').eq('user_id', currentUser.id).eq('is_active', true)
    .order('created_at', { ascending: false }).limit(1);
  if (!data?.length) { window.location.href = 'index.html'; return false; }
  currentRole = data[0].role;
  if (requiredRoles && !requiredRoles.includes(currentRole)) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#d63031">Access denied for role: ' + currentRole + '<br><a href="index.html">← Back</a></div>';
    return false;
  }
  return true;
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// ── UTILS ──
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(ts) {
  if (!ts) return '-';
  try { return new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return ts; }
}
function showAlert(el, msg, type) {
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${esc(msg)}</div>`;
  setTimeout(() => { if(el) el.innerHTML=''; }, 5000);
}
function setRoleChip(id) {
  const el = document.getElementById(id);
  if (el) { el.textContent = currentRole; el.className = `role-tag badge-${currentRole}`; }
}
function go(page){window.location.href=page;}
async function doLogout2(){await sb.auth.signOut();location.reload();}
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-password').value;
  const alertEl=document.getElementById('login-alert');
  alertEl.innerHTML='';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showAlert(alertEl,error.message,'error');return;}
  currentUser=data.user;
  const {data:roles}=await sb.from('ngm_admin_roles').select('role,is_active').eq('user_id',currentUser.id).eq('is_active',true).limit(1);
  if(!roles?.length){showAlert(alertEl,'Access denied. Not an admin.','error');await sb.auth.signOut();return;}
  currentRole=roles[0].role;
  showDashboard();
}
async function showDashboard(){
  document.getElementById('page-login').style.display='none';
  document.getElementById('page-dashboard').style.display='block';
  const el=document.getElementById('dash-role');
  el.textContent=currentRole;el.className='role-tag badge-'+currentRole;
}
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;
    const {data}=await sb.from('ngm_admin_roles').select('role,is_active').eq('user_id',currentUser.id).eq('is_active',true).limit(1);
    if(data?.length){currentRole=data[0].role;showDashboard();}
  }
})();
</script></body></html>
