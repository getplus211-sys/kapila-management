<!DOCTYPE html><html lang="gu"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KAPILA Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>:root{--primary:#6c5ce7;--primary-light:#a29bfe;--bg:#f0efff;--card:#fff;--text:#2d3436;--muted:#636e72;--border:#e0dff7;--green:#00b894;--red:#d63031;--orange:#e17055;--radius:10px;--shadow:0 2px 12px rgba(108,92,231,.1);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.wrap{padding:16px;max-width:1000px;margin:0 auto;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:22px;font-weight:700;}
.page-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit;background:#fafafa;}
input:focus,select:focus,textarea:focus{border-color:var(--primary-light);background:#fff;}
textarea{resize:vertical;min-height:80px;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;}
.fg{margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:opacity .2s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-block{width:100%;justify-content:center;padding:12px;}
.role-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;}
.badge-owner{background:#e9d5ff;color:#6d28d9;}
.badge-admin{background:#dbeafe;color:#1e40af;}
.badge-moderator{background:#fce7f3;color:#9d174d;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.alert-error{background:#f8d7da;color:#721c24;}
.alert-success{background:#d4edda;color:#155724;}
.alert-info{background:#d1ecf1;color:#0c5460;}
.login-card{background:var(--card);border-radius:var(--radius);padding:36px;box-shadow:var(--shadow);max-width:400px;margin:60px auto;}
.login-card h2{color:var(--primary);margin-bottom:24px;font-size:22px;}
#page-dashboard{display:none;}

.section-block{margin-bottom:28px;}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.section-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.section-icon.admin-icon{background:linear-gradient(135deg,#74b9ff33,#0984e333);}
.section-icon.content-icon{background:linear-gradient(135deg,#ffeaa733,#fdcb6e33);}
.section-title{font-size:16px;font-weight:800;}
.section-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:700px){.module-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:420px){.module-grid{grid-template-columns:1fr;}}
.mod-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;font-size:13.5px;font-weight:700;color:var(--text);text-align:left;box-shadow:var(--shadow);transition:transform .15s,border-color .15s;display:flex;flex-direction:column;gap:4px;}
.mod-btn:hover{transform:translateY(-2px);border-color:var(--primary-light);}
.mod-btn .mod-emoji{font-size:20px;}
.mod-btn .mod-desc{font-size:11px;color:var(--muted);font-weight:500;line-height:1.3;}
</style></head><body>
<div class="topbar">KAPILA Management System</div>
<!-- LOGIN -->
<div id="page-login" class="wrap">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <div id="login-alert"></div>
    <div class="fg"><label>Email</label><input type="email" id="login-email" placeholder="admin@example.com"></div>
    <div class="fg"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Login</button>
  </div>
</div>
<!-- DASHBOARD -->
<div id="page-dashboard" class="wrap">
  <div class="page-header">
    <div><div class="page-title">Admin Panel</div>
      <div style="font-size:12px;color:var(--muted)">Access Granted: <span id="dash-role" class="role-tag"></span></div></div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout2()">Logout</button>
  </div>

  <!-- ═══════════ ADMINISTRATION ═══════════ -->
  <div class="section-block">
    <div class="section-head">
      <div class="section-icon admin-icon">⚙️</div>
      <div>
        <div class="section-title">Administration</div>
        <div class="section-sub">Users, revenue, moderation, ane system settings</div>
      </div>
    </div>
    <div class="module-grid">
      <button class="mod-btn" onclick="go('analytics.html')"><span class="mod-emoji">📊</span>App Analytics<span class="mod-desc">Usage &amp; growth stats</span></button>
      <button class="mod-btn" onclick="go('revenue.html')"><span class="mod-emoji">💰</span>Revenue Analytics<span class="mod-desc">Sales &amp; payment trends</span></button>
      <button class="mod-btn" onclick="go('verification.html')"><span class="mod-emoji">✅</span>Verification Requests<span class="mod-desc">Pending user verifications</span></button>
      <button class="mod-btn" onclick="go('verified.html')"><span class="mod-emoji">🏅</span>Verified Users<span class="mod-desc">Manage verified badges</span></button>
      <button class="mod-btn" onclick="go('reports.html')"><span class="mod-emoji">🚩</span>Reports<span class="mod-desc">User &amp; content reports</span></button>
      <button class="mod-btn" onclick="go('feedback.html')"><span class="mod-emoji">💬</span>Ask/Feedback Replies<span class="mod-desc">Respond to user queries</span></button>
      <button class="mod-btn" onclick="go('affiliate-requests.html')"><span class="mod-emoji">🤝</span>Affiliate Requests<span class="mod-desc">New affiliate applications</span></button>
      <button class="mod-btn" onclick="go('affiliate-payouts.html')"><span class="mod-emoji">💸</span>Affiliate Payouts<span class="mod-desc">Process pending payouts</span></button>
      <button class="mod-btn" onclick="go('affiliate-commission.html')"><span class="mod-emoji">📋</span>Commission Rules<span class="mod-desc">Affiliate earning rules</span></button>
      <button class="mod-btn" onclick="go('subscription-plans.html')"><span class="mod-emoji">📦</span>Subscription Plans<span class="mod-desc">Pricing &amp; plan setup</span></button>
      <button class="mod-btn" onclick="go('notification-broadcast.html')"><span class="mod-emoji">🔔</span>Notification Broadcast<span class="mod-desc">Send app notifications</span></button>
      <button class="mod-btn" onclick="go('admin-users.html')"><span class="mod-emoji">👤</span>Admin Users<span class="mod-desc">Manage admin roles</span></button>
      <button class="mod-btn" onclick="go('audit-logs.html')"><span class="mod-emoji">📜</span>Audit Logs<span class="mod-desc">Admin activity history</span></button>
    </div>
  </div>

  <!-- ═══════════ CONTENT DEVELOPMENT ═══════════ -->
  <div class="section-block">
    <div class="section-head">
      <div class="section-icon content-icon">📚</div>
      <div>
        <div class="section-title">Content Development</div>
        <div class="section-sub">Questions, quizzes, current affairs ane mock tests</div>
      </div>
    </div>
    <div class="module-grid">
      <button class="mod-btn" onclick="go('question-bank.html')"><span class="mod-emoji">🗂️</span>Question Bank<span class="mod-desc">Subjects, chapters &amp; questions</span></button>
      <button class="mod-btn" onclick="go('suggestions.html')"><span class="mod-emoji">💡</span>Suggestions<span class="mod-desc">User-reported question fixes</span></button>
      <button class="mod-btn" onclick="go('daily-learning.html')"><span class="mod-emoji">📘</span>Daily Learning<span class="mod-desc">Daily quiz setup</span></button>
      <button class="mod-btn" onclick="go('monthly_quiz_admin.html')"><span class="mod-emoji">🗓️</span>Monthly Quiz<span class="mod-desc">Monthly quiz setup</span></button>
      <button class="mod-btn" onclick="go('current-affairs.html')"><span class="mod-emoji">📰</span>Current Affairs<span class="mod-desc">Daily affairs blog &amp; quiz</span></button>
      <button class="mod-btn" onclick="go('test-series.html')"><span class="mod-emoji">📝</span>Test Series Manager<span class="mod-desc">Manage mock test series</span></button>
      <button class="mod-btn" onclick="go('mock-broadcast.html')"><span class="mod-emoji">📢</span>Mock Broadcast<span class="mod-desc">Publish mock tests live</span></button>
    </div>
  </div>
</div>
<script>
// ── SHARED CONFIG ── paste your values here
const SUPABASE_URL  = 'https://bhmycvrbucmbbrpzeane.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJobXljdnJidWNtYmJycHplYW5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2OTQwOTYsImV4cCI6MjA4MDI3MDA5Nn0.qQ3bw9cADG0P8hbGwx76Oeg54l-9FbRWxc92nZdSPL4';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;
let currentRole = null;

// ── AUTH ──
async function initAuth(requiredRoles) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return false; }
  currentUser = session.user;
  const { data } = await sb.from('ngm_admin_roles')
    .select('role,is_active').eq('user_id', currentUser.id).eq('is_active', true)
    .order('created_at', { ascending: false }).limit(1);
  if (!data?.length) { window.location.href = 'index.html'; return false; }
  currentRole = data[0].role;
  if (requiredRoles && !requiredRoles.includes(currentRole)) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#d63031">Access denied for role: ' + currentRole + '<br><a href="index.html">← Back</a></div>';
    return false;
  }
  return true;
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// ── UTILS ──
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(ts) {
  if (!ts) return '-';
  try { return new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return ts; }
}
function showAlert(el, msg, type) {
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${esc(msg)}</div>`;
  setTimeout(() => { if(el) el.innerHTML=''; }, 5000);
}
function setRoleChip(id) {
  const el = document.getElementById(id);
  if (el) { el.textContent = currentRole; el.className = `role-tag badge-${currentRole}`; }
}
function go(page){window.location.href=page;}
async function doLogout2(){await sb.auth.signOut();location.reload();}
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-password').value;
  const alertEl=document.getElementById('login-alert');
  alertEl.innerHTML='';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showAlert(alertEl,error.message,'error');return;}
  currentUser=data.user;
  const {data:roles}=await sb.from('ngm_admin_roles').select('role,is_active').eq('user_id',currentUser.id).eq('is_active',true).limit(1);
  if(!roles?.length){showAlert(alertEl,'Access denied. Not an admin.','error');await sb.auth.signOut();return;}
  currentRole=roles[0].role;
  showDashboard();
}
async function showDashboard(){
  document.getElementById('page-login').style.display='none';
  document.getElementById('page-dashboard').style.display='block';
  const el=document.getElementById('dash-role');
  el.textContent=currentRole;el.className='role-tag badge-'+currentRole;
}
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;
    const {data}=await sb.from('ngm_admin_roles').select('role,is_active').eq('user_id',currentUser.id).eq('is_active',true).limit(1);
    if(data?.length){currentRole=data[0].role;showDashboard();}
  }
})();
</script></body></html>
