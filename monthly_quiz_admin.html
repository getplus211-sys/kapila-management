<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monthly Quiz - KAPILA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#6c5ce7;--primary-light:#a29bfe;--bg:#f0efff;--card:#fff;--text:#2d3436;--muted:#636e72;--border:#e0dff7;--green:#00b894;--red:#d63031;--orange:#e17055;--radius:10px;--shadow:0 2px 12px rgba(108,92,231,.1);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.wrap{padding:16px;max-width:1100px;margin:0 auto;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:22px;font-weight:700;}
.page-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;outline:none;font-family:inherit;background:#fafafa;}
input:focus,select:focus,textarea:focus{border-color:var(--primary-light);background:#fff;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;}
.fg{margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:opacity .2s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-sm{padding:5px 10px;font-size:12px;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.alert-error{background:#f8d7da;color:#721c24;}
.alert-success{background:#d4edda;color:#155724;}
.loading,.empty{text-align:center;padding:30px;color:var(--muted);font-size:14px;}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.sec-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 10px;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opt-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:600px){.opt-grid,.opt-grid-3{grid-template-columns:1fr;}}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;display:inline-block;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;border-radius:22px;background:#ccc;cursor:pointer;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--green);}
.toggle-slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);}
.toggle-wrap{display:flex;align-items:center;gap:8px;}
.toggle-label{font-size:12px;font-weight:700;}
.badge-on{background:#d4edda;color:#155724;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;}
.badge-off{background:#f1f1f1;color:var(--muted);font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;}
.count-badge{background:var(--primary);color:#fff;border-radius:12px;font-size:11px;padding:2px 8px;font-weight:700;}

/* Layout */
.mq-wrap{display:flex;gap:14px;align-items:flex-start;}
.mq-list-panel{width:270px;flex-shrink:0;position:sticky;top:10px;}
.mq-editor-panel{flex:1;min-width:0;}
@media(max-width:700px){.mq-wrap{flex-direction:column;}.mq-list-panel{width:100%;position:static;}}

.new-quiz-btn{width:100%;padding:10px;border:2px dashed var(--primary-light);border-radius:10px;background:transparent;cursor:pointer;color:var(--primary);font-size:14px;font-weight:600;font-family:inherit;margin-bottom:10px;}
.new-quiz-btn:hover{background:#f5f3ff;}

.quiz-card{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;background:var(--card);cursor:pointer;}
.quiz-card:hover{border-color:var(--primary-light);}
.quiz-card.selected{border-color:var(--primary);background:#f5f3ff;}
.quiz-card .qc-month{font-size:11px;color:var(--primary);font-weight:700;margin-bottom:3px;}
.quiz-card .qc-name{font-size:13px;font-weight:700;line-height:1.4;}
.quiz-card .qc-meta{font-size:11px;color:var(--muted);margin-top:5px;}

/* Questions table */
.q-table{width:100%;border-collapse:collapse;font-size:13px;}
.q-table th{background:var(--bg);padding:8px 10px;text-align:left;font-size:12px;color:var(--muted);border-bottom:2px solid var(--border);}
.q-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
.q-table tr:last-child td{border-bottom:none;}
.q-table tr:hover td{background:#fafafa;}
.q-empty{text-align:center;padding:20px;color:var(--muted);font-size:13px;}

/* Question form */
.q-form-wrap{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:14px;}
.q-form-wrap.editing{border:2px solid var(--primary-light);}
.ans-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:600px){.ans-opts{grid-template-columns:1fr;}}

.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.filter-row select{flex:1;min-width:120px;}
</style>
</head>
<body>
<div class="topbar">KAPILA Management System <a href="index.html" style="color:var(--primary);text-decoration:none;font-size:12px">&#8592; Dashboard</a></div>
<div class="wrap">
  <div class="page-header">
    <div class="page-title">Monthly Quiz</div>
    <div class="page-actions">
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button>
      <a href="index.html" class="btn btn-ghost btn-sm">Back</a>
    </div>
  </div>
  <div id="top-alert"></div>

  <div class="mq-wrap">
    <!-- LEFT: Quiz List -->
    <div class="mq-list-panel">
      <div class="sec-label">Quiz List</div>
      <button class="new-quiz-btn" onclick="newQuiz()">+ New Monthly Quiz</button>

      <!-- Filter by year/month -->
      <div class="filter-row" style="margin-bottom:10px;">
        <select id="filter-year" onchange="loadQuizList()" style="flex:1;min-width:80px;">
          <!-- filled by JS -->
        </select>
        <select id="filter-month" onchange="loadQuizList()" style="flex:1;min-width:100px;">
          <option value="">All Months</option>
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
      </div>

      <div id="quiz-list"><div class="loading"><span class="spinner"></span>Loading...</div></div>
    </div>

    <!-- RIGHT: Editor -->
    <div class="mq-editor-panel">
      <div id="editor-placeholder" class="card" style="text-align:center;padding:48px 24px;color:var(--muted)">
        <div style="font-size:40px;margin-bottom:12px">&#128197;</div>
        <div style="font-size:15px;font-weight:600">Left mathi quiz select karo ya navi banavo</div>
      </div>

      <div id="editor" style="display:none;">

        <!-- Quiz Settings -->
        <div class="card">
          <div class="sec-label">Quiz Settings</div>
          <div id="settings-alert"></div>
          <div class="opt-grid">
            <div class="fg">
              <label>Year</label>
              <select id="ef-year">
                <!-- filled by JS -->
              </select>
            </div>
            <div class="fg">
              <label>Month</label>
              <select id="ef-month">
                <option value="1">January</option><option value="2">February</option>
                <option value="3">March</option><option value="4">April</option>
                <option value="5">May</option><option value="6">June</option>
                <option value="7">July</option><option value="8">August</option>
                <option value="9">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
              </select>
            </div>
          </div>
          <div class="fg"><label>Quiz Name</label><input id="ef-name" placeholder="e.g. June 2026 Monthly Quiz"></div>
          <div class="opt-grid">
            <div class="fg"><label>Total Questions</label><input type="number" id="ef-total" min="1" value="10"></div>
            <div class="fg"><label>Time Limit (minutes)</label><input type="number" id="ef-time" min="1" value="20"></div>
          </div>
          <div class="fg">
            <div class="toggle-wrap">
              <label class="toggle"><input type="checkbox" id="ef-enabled"><span class="toggle-slider"></span></label>
              <span class="toggle-label" id="ef-enabled-label" style="color:var(--muted)">OFF (app ma nahi dekhashe)</span>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary" id="save-settings-btn" onclick="saveSettings()">Save Settings</button>
            <button class="btn btn-danger btn-sm" id="delete-quiz-btn" style="display:none" onclick="deleteQuiz()">Delete Quiz</button>
          </div>
        </div>

        <!-- Questions Section -->
        <div class="card" id="questions-card" style="display:none;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
            <div class="sec-label" style="margin:0;">Questions <span class="count-badge" id="q-count">0</span></div>
            <button class="btn btn-success btn-sm" onclick="showAddForm()">+ Add Question</button>
          </div>

          <!-- Add/Edit Form -->
          <div id="q-form-wrap" style="display:none;" class="q-form-wrap">
            <div id="form-alert"></div>
            <div class="fg"><label>Question</label><textarea id="f-question" style="min-height:70px;" placeholder="Question text..."></textarea></div>
            <div class="ans-opts">
              <div class="fg"><label>Option A</label><input id="f-oa" placeholder="Option A"></div>
              <div class="fg"><label>Option B</label><input id="f-ob" placeholder="Option B"></div>
              <div class="fg"><label>Option C</label><input id="f-oc" placeholder="Option C"></div>
              <div class="fg"><label>Option D</label><input id="f-od" placeholder="Option D"></div>
            </div>
            <div class="fg"><label>Option E (optional)</label><input id="f-oe" placeholder="Option E (blank rehva do je nahi joie)"></div>
            <div class="opt-grid">
              <div class="fg">
                <label>Correct Answer</label>
                <select id="f-ans">
                  <option value="A">A</option><option value="B">B</option>
                  <option value="C">C</option><option value="D">D</option>
                  <option value="E">E</option>
                </select>
              </div>
              <div class="fg"><label>Display Order</label><input type="number" id="f-order" min="1" value="1"></div>
            </div>
            <div class="fg"><label>Solution / Explanation</label><textarea id="f-solution" style="min-height:60px;" placeholder="Explanation..."></textarea></div>
            <div class="fg"><label>Suggestion (optional)</label><input id="f-suggestion" placeholder="Tip or memory trick..."></div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn btn-primary" onclick="saveQuestion()">Save Question</button>
              <button class="btn btn-ghost" onclick="hideForm()">Cancel</button>
              <button class="btn btn-danger btn-sm" id="delete-q-btn" style="display:none;" onclick="deleteQuestion()">Delete</button>
            </div>
          </div>

          <!-- Questions Table -->
          <div style="overflow-x:auto;">
            <table class="q-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Question</th>
                  <th>Ans</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="q-tbody">
                <tr><td colspan="4" class="q-empty">Questions load thay chhe...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://bhmycvrbucmbbrpzeane.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJobXljdnJidWNtYmJycHplYW5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2OTQwOTYsImV4cCI6MjA4MDI3MDA5Nn0.qQ3bw9cADG0P8hbGwx76Oeg54l-9FbRWxc92nZdSPL4';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];

var currentUser = null;
var allQuizzes = [];
var curQuiz = null;
var allQuestions = [];
var editingQuestion = null;

function esc(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showAlert(elId, msg, type){
  var el = document.getElementById(elId);
  if(!el) return;
  el.innerHTML = '<div class="alert alert-'+type+'">'+esc(msg)+'</div>';
  setTimeout(function(){ if(el) el.innerHTML=''; }, 5000);
}

function fillYearDropdowns(){
  var cur = new Date().getFullYear();
  var years = '';
  for(var y = cur-2; y <= cur+2; y++){
    years += '<option value="'+y+'"'+(y===cur?' selected':'')+'>'+y+'</option>';
  }
  document.getElementById('filter-year').innerHTML = '<option value="">All Years</option>'+years;
  document.getElementById('ef-year').innerHTML = years;
}

async function initAuth(){
  var res = await sb.auth.getSession();
  var session = res.data.session;
  if(!session){ window.location.href='index.html'; return false; }
  currentUser = session.user;
  var r = await sb.from('ngm_admin_roles').select('role,is_active').eq('user_id',currentUser.id).eq('is_active',true).limit(1);
  if(!r.data||!r.data.length){ window.location.href='index.html'; return false; }
  return true;
}
async function doLogout(){ await sb.auth.signOut(); window.location.href='index.html'; }

// ===== QUIZ LIST =====
async function loadQuizList(){
  var yr = document.getElementById('filter-year').value;
  var mn = document.getElementById('filter-month').value;
  var query = sb.from('kls_monthly_quiz_settings').select('*').order('quiz_year',{ascending:false}).order('quiz_month',{ascending:false});
  if(yr) query = query.eq('quiz_year', parseInt(yr));
  if(mn) query = query.eq('quiz_month', parseInt(mn));
  var res = await query;
  allQuizzes = res.data || [];
  renderQuizList();
}

function renderQuizList(){
  var el = document.getElementById('quiz-list');
  if(!allQuizzes.length){ el.innerHTML='<div class="empty" style="padding:16px;font-size:13px">No quizzes yet.</div>'; return; }
  var html='';
  for(var i=0;i<allQuizzes.length;i++){
    var q=allQuizzes[i];
    var sel = curQuiz && curQuiz.monthly_quiz_setting_id===q.monthly_quiz_setting_id;
    html+='<div class="quiz-card '+(sel?'selected':'')+'" onclick="selectQuiz('+q.monthly_quiz_setting_id+')">';
    html+='<div class="qc-month">'+MONTHS[q.quiz_month]+' '+q.quiz_year+'</div>';
    html+='<div class="qc-name">'+esc(q.quiz_name)+'</div>';
    html+='<div class="qc-meta">'+(q.is_enabled?'<span class="badge-on">LIVE</span>':'<span class="badge-off">OFF</span>')+' &nbsp;'+q.total_questions+' questions &nbsp;'+q.time_limit+' min</div>';
    html+='</div>';
  }
  el.innerHTML=html;
}

async function selectQuiz(id){
  curQuiz=null;
  for(var i=0;i<allQuizzes.length;i++){ if(allQuizzes[i].monthly_quiz_setting_id===id){ curQuiz=allQuizzes[i]; break; } }
  if(!curQuiz) return;
  openEditor();
  await loadQuestions();
  renderQuizList();
}

function newQuiz(){
  curQuiz=null;
  editingQuestion=null;
  openEditor();
  document.getElementById('questions-card').style.display='none';
  document.getElementById('q-form-wrap').style.display='none';
  renderQuizList();
}

function openEditor(){
  document.getElementById('editor-placeholder').style.display='none';
  document.getElementById('editor').style.display='block';
  var cur = new Date();
  document.getElementById('ef-year').value = curQuiz ? curQuiz.quiz_year : cur.getFullYear();
  document.getElementById('ef-month').value = curQuiz ? curQuiz.quiz_month : (cur.getMonth()+1);
  document.getElementById('ef-name').value = curQuiz ? curQuiz.quiz_name : '';
  document.getElementById('ef-total').value = curQuiz ? curQuiz.total_questions : 10;
  document.getElementById('ef-time').value = curQuiz ? curQuiz.time_limit : 20;
  document.getElementById('ef-enabled').checked = curQuiz ? !!curQuiz.is_enabled : false;
  updateEnabledLabel();
  document.getElementById('delete-quiz-btn').style.display = curQuiz ? '' : 'none';
  document.getElementById('ef-enabled').onchange = updateEnabledLabel;
}

function updateEnabledLabel(){
  var on = document.getElementById('ef-enabled').checked;
  var lbl = document.getElementById('ef-enabled-label');
  lbl.textContent = on ? 'LIVE (app ma dekhashe)' : 'OFF (app ma nahi dekhashe)';
  lbl.style.color = on ? 'var(--green)' : 'var(--muted)';
}

// ===== SAVE QUIZ SETTINGS =====
async function saveSettings(){
  var yr  = parseInt(document.getElementById('ef-year').value);
  var mn  = parseInt(document.getElementById('ef-month').value);
  var nm  = document.getElementById('ef-name').value.trim();
  var tot = parseInt(document.getElementById('ef-total').value)||0;
  var tim = parseInt(document.getElementById('ef-time').value)||20;
  var en  = document.getElementById('ef-enabled').checked;
  if(!nm){ showAlert('settings-alert','Quiz name required','error'); return; }
  var btn = document.getElementById('save-settings-btn');
  btn.disabled=true; btn.textContent='Saving...';
  var payload={quiz_name:nm, quiz_year:yr, quiz_month:mn, total_questions:tot, time_limit:tim, is_enabled:en, updated_by:currentUser.id};
  var res;
  if(curQuiz){
    res = await sb.from('kls_monthly_quiz_settings').update(payload).eq('monthly_quiz_setting_id',curQuiz.monthly_quiz_setting_id).select().single();
  } else {
    var quizId = 'MQ-'+yr+'-'+(mn<10?'0':'')+mn+'-'+Date.now();
    payload.quiz_id = quizId;
    payload.created_by = currentUser.id;
    res = await sb.from('kls_monthly_quiz_settings').insert(payload).select().single();
  }
  btn.disabled=false; btn.textContent='Save Settings';
  if(res.error){ showAlert('settings-alert',res.error.message,'error'); return; }
  curQuiz=res.data;
  document.getElementById('delete-quiz-btn').style.display='';
  document.getElementById('questions-card').style.display='';
  await loadQuizList();
  await loadQuestions();
  showAlert('top-alert','Quiz settings saved!','success');
}

async function deleteQuiz(){
  if(!curQuiz) return;
  if(!confirm('Aa quiz ane ena badha questions delete karva chhe?')) return;
  await sb.from('kls_monthly_quiz_question_items').delete().eq('quiz_id',curQuiz.quiz_id);
  await sb.from('kls_monthly_quiz_settings').delete().eq('monthly_quiz_setting_id',curQuiz.monthly_quiz_setting_id);
  curQuiz=null;
  document.getElementById('editor').style.display='none';
  document.getElementById('editor-placeholder').style.display='block';
  await loadQuizList();
  showAlert('top-alert','Quiz deleted.','success');
}

// ===== QUESTIONS =====
async function loadQuestions(){
  if(!curQuiz){ return; }
  document.getElementById('questions-card').style.display='';
  var res = await sb.from('kls_monthly_quiz_question_items').select('*').eq('quiz_id',curQuiz.quiz_id).order('display_order');
  allQuestions = res.data||[];
  document.getElementById('q-count').textContent=allQuestions.length;
  renderQTable();
}

function renderQTable(){
  var tbody=document.getElementById('q-tbody');
  if(!allQuestions.length){
    tbody.innerHTML='<tr><td colspan="4" class="q-empty">Koi questions nathi. "+ Add Question" thabasho.</td></tr>';
    return;
  }
  var html='';
  for(var i=0;i<allQuestions.length;i++){
    var q=allQuestions[i];
    var txt=(q.question||'').substring(0,80)+((q.question||'').length>80?'...':'');
    html+='<tr>';
    html+='<td style="color:var(--muted);white-space:nowrap">'+q.display_order+'</td>';
    html+='<td>'+esc(txt)+'</td>';
    html+='<td><strong style="color:var(--primary)">'+esc(q.correct_answer)+'</strong></td>';
    html+='<td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="editQuestion('+q.monthly_quiz_question_item_id+')">Edit</button></td>';
    html+='</tr>';
  }
  tbody.innerHTML=html;
}

function showAddForm(){
  editingQuestion=null;
  document.getElementById('f-question').value='';
  document.getElementById('f-oa').value='';
  document.getElementById('f-ob').value='';
  document.getElementById('f-oc').value='';
  document.getElementById('f-od').value='';
  document.getElementById('f-oe').value='';
  document.getElementById('f-ans').value='A';
  document.getElementById('f-solution').value='';
  document.getElementById('f-suggestion').value='';
  document.getElementById('f-order').value=allQuestions.length+1;
  document.getElementById('delete-q-btn').style.display='none';
  document.getElementById('form-alert').innerHTML='';
  var wrap=document.getElementById('q-form-wrap');
  wrap.style.display='';
  wrap.className='q-form-wrap';
  wrap.scrollIntoView({behavior:'smooth',block:'start'});
}

function editQuestion(id){
  var q=null;
  for(var i=0;i<allQuestions.length;i++){ if(allQuestions[i].monthly_quiz_question_item_id===id){ q=allQuestions[i]; break; } }
  if(!q) return;
  editingQuestion=q;
  document.getElementById('f-question').value=q.question||'';
  document.getElementById('f-oa').value=q.option_a||'';
  document.getElementById('f-ob').value=q.option_b||'';
  document.getElementById('f-oc').value=q.option_c||'';
  document.getElementById('f-od').value=q.option_d||'';
  document.getElementById('f-oe').value=q.option_e||'';
  document.getElementById('f-ans').value=q.correct_answer||'A';
  document.getElementById('f-solution').value=q.solution||'';
  document.getElementById('f-suggestion').value=q.suggestion||'';
  document.getElementById('f-order').value=q.display_order||1;
  document.getElementById('delete-q-btn').style.display='';
  document.getElementById('form-alert').innerHTML='';
  var wrap=document.getElementById('q-form-wrap');
  wrap.style.display='';
  wrap.className='q-form-wrap editing';
  wrap.scrollIntoView({behavior:'smooth',block:'start'});
}

function hideForm(){
  document.getElementById('q-form-wrap').style.display='none';
  editingQuestion=null;
}

async function saveQuestion(){
  if(!curQuiz){ showAlert('form-alert','Pahela quiz save karo','error'); return; }
  var question=document.getElementById('f-question').value.trim();
  var oa=document.getElementById('f-oa').value.trim();
  var ob=document.getElementById('f-ob').value.trim();
  var oc=document.getElementById('f-oc').value.trim();
  var od=document.getElementById('f-od').value.trim();
  var oe=document.getElementById('f-oe').value.trim();
  var ans=document.getElementById('f-ans').value;
  var solution=document.getElementById('f-solution').value.trim();
  var suggestion=document.getElementById('f-suggestion').value.trim();
  var order=parseInt(document.getElementById('f-order').value)||1;
  if(!question){ showAlert('form-alert','Question required','error'); return; }
  if(!oa||!ob||!oc||!od){ showAlert('form-alert','Options A, B, C, D required','error'); return; }
  var payload={
    quiz_id:curQuiz.quiz_id,
    question:question,
    option_a:oa, option_b:ob, option_c:oc, option_d:od,
    option_e:oe||null,
    correct_answer:ans,
    solution:solution||null,
    suggestion:suggestion||null,
    display_order:order
  };
  var res;
  if(editingQuestion){
    res=await sb.from('kls_monthly_quiz_question_items').update(payload).eq('monthly_quiz_question_item_id',editingQuestion.monthly_quiz_question_item_id).select().single();
  } else {
    res=await sb.from('kls_monthly_quiz_question_items').insert(payload).select().single();
  }
  if(res.error){ showAlert('form-alert',res.error.message,'error'); return; }
  hideForm();
  await loadQuestions();
  // auto-update total_questions
  await sb.from('kls_monthly_quiz_settings').update({total_questions:allQuestions.length, updated_by:currentUser.id}).eq('monthly_quiz_setting_id',curQuiz.monthly_quiz_setting_id);
  document.getElementById('q-count').textContent=allQuestions.length;
  showAlert('top-alert', editingQuestion ? 'Question updated!' : 'Question added!','success');
  editingQuestion=null;
}

async function deleteQuestion(){
  if(!editingQuestion) return;
  if(!confirm('Aa question delete karvu chhe?')) return;
  await sb.from('kls_monthly_quiz_question_items').delete().eq('monthly_quiz_question_item_id',editingQuestion.monthly_quiz_question_item_id);
  hideForm();
  await loadQuestions();
  await sb.from('kls_monthly_quiz_settings').update({total_questions:allQuestions.length, updated_by:currentUser.id}).eq('monthly_quiz_setting_id',curQuiz.monthly_quiz_setting_id);
  document.getElementById('q-count').textContent=allQuestions.length;
  showAlert('top-alert','Question deleted.','success');
}

(async function(){
  if(!await initAuth()) return;
  fillYearDropdowns();
  // default filter to current year
  var cur=new Date();
  document.getElementById('filter-year').value=cur.getFullYear();
  document.getElementById('filter-month').value=cur.getMonth()+1;
  await loadQuizList();
})();
</script>
